<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Leads University Islamabad Campus — Assistant</title>
<style>
  body { font-family: system-ui, sans-serif; background: #f4f5f7; margin: 0; }
  #chat { max-width: 480px; margin: 40px auto; background: #fff; border-radius: 12px;
          box-shadow: 0 2px 12px rgba(0,0,0,0.08); display: flex; flex-direction: column; height: 640px;
          position: relative; overflow: hidden; }
  header { padding: 16px; background: #0b3d2e; color: #fff; border-radius: 12px 12px 0 0; font-weight: 600; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 12px; line-height: 1.4; font-size: 14px; }
  .user { align-self: flex-end; background: #0b3d2e; color: #fff; }
  .bot { align-self: flex-start; background: #eef1ef; color: #222; }
  .sources { font-size: 11px; color: #777; margin-top: 4px; }
  form.chatform { display: flex; border-top: 1px solid #eee; }
  form.chatform input { flex: 1; border: none; padding: 14px; font-size: 14px; outline: none; }
  form.chatform button { background: #0b3d2e; color: #fff; border: none; padding: 0 20px; cursor: pointer; }

  /* Lead-capture gate */
  #gate { position: absolute; inset: 0; background: #fff; display: flex; flex-direction: column;
          justify-content: center; padding: 28px; gap: 12px; }
  #gate h2 { margin: 0 0 4px; font-size: 18px; color: #0b3d2e; }
  #gate p { margin: 0 0 12px; font-size: 13px; color: #666; line-height: 1.4; }
  #gate input { padding: 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
  #gate input:focus { border-color: #0b3d2e; }
  #gate button { margin-top: 8px; padding: 13px; background: #0b3d2e; color: #fff; border: none;
                 border-radius: 8px; font-size: 14px; cursor: pointer; }
  #gate .error { color: #b3261e; font-size: 12px; min-height: 16px; }
</style>
</head>
<body>
<div id="chat">
  <header>Leads University — Islamabad Campus Assistant</header>

  <div id="gate">
    <h2>Before we chat...</h2>
    <p>Tell us a bit about you so we can follow up if you'd like more information. No account or password needed.</p>
    <form id="gateForm">
      <input id="gateName" placeholder="Full name" autocomplete="name" required />
      <input id="gatePhone" placeholder="Phone number" autocomplete="tel" required />
      <input id="gateEmail" type="email" placeholder="Email address" autocomplete="email" required />
      <div class="error" id="gateError"></div>
      <button type="submit">Start chatting</button>
    </form>
  </div>

  <div id="messages"></div>
  <form id="form" class="chatform">
    <input id="input" placeholder="Ask about programs, admissions, fees..." autocomplete="off" />
    <button type="submit">Send</button>
  </form>
</div>

<script>
const API_BASE = "http://localhost:8000";
const messages = document.getElementById("messages");
const form = document.getElementById("form");
const input = document.getElementById("input");
const gate = document.getElementById("gate");
const gateForm = document.getElementById("gateForm");
const gateError = document.getElementById("gateError");

let leadId = localStorage.getItem("leadId");
if (leadId) gate.style.display = "none";

gateForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  gateError.textContent = "";
  const name = document.getElementById("gateName").value.trim();
  const phone = document.getElementById("gatePhone").value.trim();
  const email = document.getElementById("gateEmail").value.trim();

  if (!name || !phone || !email) {
    gateError.textContent = "Please fill in all fields.";
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/leads`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, phone, email }),
    });
    if (!res.ok) throw new Error("bad response");
    const data = await res.json();
    leadId = data.lead_id;
    localStorage.setItem("leadId", leadId);
    gate.style.display = "none";
  } catch (err) {
    gateError.textContent = "Something went wrong — please check your details and try again.";
  }
});

function addMessage(text, who, sources) {
  const div = document.createElement("div");
  div.className = "msg " + who;
  div.textContent = text;
  if (sources && sources.length) {
    const s = document.createElement("div");
    s.className = "sources";
    s.textContent = "Sources: " + sources.join(", ");
    div.appendChild(s);
  }
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, "user");
  input.value = "";

  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, lead_id: leadId ? Number(leadId) : null }),
    });
    const data = await res.json();
    addMessage(data.answer, "bot", data.sources);
  } catch (err) {
    addMessage("Sorry, I couldn't reach the server. Is the backend running?", "bot");
  }
});
</script>
</body>
</html>
